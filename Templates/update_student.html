<!DOCTYPE html>
<html>
    <head>
        <title>Update Student </title>
        <style>
 body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4facfe, #f68b49);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.container {
    width: 450px;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(48, 6, 116, 0.5);
}
.container h1 {
    text-align: center;
    margin-bottom: 25px;
    color: #333;
}
input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 8px;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
background: #4facfe;    color: white;
    font-size: 16px;
    cursor: pointer;
}
button:hover {
    background: #2196f3;
}
        </style>
    </head>
    <body>
        <div class="container">
        <h1>Update Student</h1>
        <form method="POST">
            <label for="name">Name:</label>
            <input type="text" name="name" required value="{{ student[1] }}">
            <label for="reg_number">Registration Number:</label>
            <input type="text" name="reg_number" required value="{{ student[2] }}">
            <label for="department">Department:</label>
            <input type="text" name="department" required value="{{ student[3] }}">
            <label for="year">Year:</label>
            <input type="text" name="year" required value="{{ student[4] }}">
            <label for="email">Email:</label>
            <input type="email" name="email" required value="{{ student[5] }}">
            <label for="phone">Phone Number:</label>
            <input type="text" name="phone" required value="{{ student[7] }}">
            <button type="submit">Update Student</button>
        </form>
        </div>
    </body>
</html>
