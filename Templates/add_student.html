<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
    <style>
 body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4facfe, #f68b49);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.container {
    width: 450px;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}
.container h1 {
    text-align: center;
    margin-bottom: 25px;
    color: #333;
}
input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 8px;
    box-sizing: border-box;
}
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #4facfe;
    color: white;
    font-size: 16px;
    cursor: pointer;
}
 .success {
    background: #d4edda;
    color: #155724;
    border: 1px solid #28a745;
    padding: 15px;
    margin-bottom: 25px;
    border-radius: 8px;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
}
.error {
    background: #f8d7da;
    color: #721c24;
    border: 1px solid #dc3545;
    padding: 15px;
    margin-bottom: 25px;
    border-radius: 8px;
    text-align: center;
    font-weight: bold;
}
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
button:hover {
    background: #2196f3;
}
    </style>
</head>
<body>
   <div class="container">
    <h1>Add Student</h1>
    {% if message %}
    <div class="message {{ message_type }}">
        {{ message }}
    </div>
    {% endif %}
    <form method="POST">
        <input type="text" name="name" placeholder="Student Name" required>
        <input type="text" name="reg_no" placeholder="Registration Number" required>
        <input type="text" name="department" placeholder="Department" required>
        <input type="text" name="year" placeholder="Year" required>
        <input type="email" name="email" placeholder="Student Email" required>
        <input type="text" name="phone" placeholder="Student Phone" required>
        <button type="submit">Add Student</button>
    </form>
</div>
</body>
</html>
