<!DOCTYPE html>
<html>
    <head>
        <title>Register</title>
        <style>
  body {
    margin-top:25px;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4facfe, #f68b49);
    min-height: 95vh;
    margin-left:500px;
}
.container {
    width: 450px;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}
h4{
    margin-left:100px;
    color:black;
    margin-top:65px;
}
.container h1 {
    text-align: center;
    margin-bottom: 25px;
    color: #333;
}
input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 8px;
    box-sizing: border-box;
}
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #4facfe;
    color: white;
    font-size: 16px; 
}
.error {
    background: #f8d7da;
    color: #721c24;
    border: 1px solid #dc3545;
    padding: 15px;
    margin-bottom: 25px;
    border-radius: 8px;
    text-align: center;
    font-weight: bold;
}
button:hover {
    background: #2196f3;
}
     </style>
    </head>
    <body>
        <div class="container">
            <h1> Registration</h1>
           {% if message %}
    <div class="message {{ message_type }}">
        {{ message }}
    </div>
    {% endif %}
                <form method="POST">
                    <label>Name:</label><br>
                    <input type="text" name="name" required><br><br>
                    <label>Email:</label><br>
                    <input type="email" name="email" required><br><br>
                    <label>Password:</label><br>
                    <input type="password" name="password" required><br><br>
                    <label>Phone Number:</label><br>
                    <input type="text" name="phone" required><br><br>   
                    <button type="submit">Register</button>
                </form>
            </div>
        <h4>Already have an account? <a href="/login">Login here</a></h4>      
    </body>
</html>
