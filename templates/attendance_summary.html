<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Attendance Summary</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Poppins",sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:35px;

    background:
    radial-gradient(circle at top left,#2563eb,transparent 35%),
    radial-gradient(circle at bottom right,#0891b2,transparent 35%),
    linear-gradient(135deg,#020617,#0f172a);

    color:white;

}

/* Glass Card */

.container{

    width:500px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.15);

    border-radius:25px;

    overflow:hidden;

    box-shadow:0 20px 50px rgba(0,0,0,.45);

    animation:fadeIn .5s ease;

}

/* Header */

.header{

    text-align:center;

    padding:28px;

    background:linear-gradient(135deg,#2563eb,#1d4ed8);

}

.header h2{

    color:white;

    font-size:32px;

    font-weight:700;

}

/* Content */

.content{

    padding:30px;

}

/* Summary Cards */

.card{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:18px 22px;

    margin-bottom:18px;

    border-radius:15px;

    color:white;

    font-size:18px;

    font-weight:600;

    transition:.3s;

    box-shadow:0 10px 25px rgba(0,0,0,.25);

}

.card:hover{

    transform:translateY(-5px) scale(1.02);

}

/* Individual Colors */

.present{

    background:linear-gradient(135deg,#22c55e,#15803d);

}

.absent{

    background:linear-gradient(135deg,#ef4444,#b91c1c);

}

.total{

    background:linear-gradient(135deg,#f59e0b,#d97706);

}

.percentage{

    background:linear-gradient(135deg,#3b82f6,#2563eb);

}

/* Back Button */

.back{

    display:block;

    width:100%;

    margin-top:15px;

    padding:15px;

    text-align:center;

    text-decoration:none;

    color:white;

    font-size:17px;

    font-weight:600;

    border-radius:12px;

    background:#334155;

    transition:.3s;

}

.back:hover{

    background:#475569;

    transform:translateY(-3px);

}

/* Animation */

@keyframes fadeIn{

    from{

        opacity:0;

        transform:translateY(30px);

    }

    to{

        opacity:1;

        transform:translateY(0);

    }

}

/* Responsive */

@media(max-width:600px){

body{

    padding:20px;

}

.container{

    width:100%;

}

.header h2{

    font-size:26px;

}

.card{

    font-size:16px;

    padding:16px;

}

.back{

    font-size:16px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h2>📊 Attendance Summary</h2>

</div>

<div class="content">

<div class="card present">

<span>✅ Present Hours</span>

<span>{{ present }}</span>

</div>

<div class="card absent">

<span>❌ Absent Hours</span>

<span>{{ absent }}</span>

</div>

<div class="card total">

<span>📚 Total Hours</span>

<span>{{ present + absent }}</span>

</div>

<div class="card percentage">

<span>📈 Attendance Percentage</span>

<span>{{ percentage }}%</span>

</div>

{% if session['role'] == 'admin' %}

<a href="/view_students" class="back">
⬅ Back to Students
</a>

{% else %}

<a href="/student_dashboard" class="back">
⬅ Back to Dashboard
</a>

{% endif %}

</div>

</div>

</body>

</html>
