<!DOCTYPE html>
<html>
    <head>
        <title>Login</title>
        <style>
  body {
    margin-top:25px;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4facfe, #f68b49);
    min-height: 95vh;
    margin-left:500px;
}
.container {
    width: 450px;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}
h4{
    margin-left:100px;
    color:black;
    margin-top:65px;
}
.container h1 {
    text-align: center;
    margin-bottom: 25px;
    color: #333;
}
input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 8px;
    box-sizing: border-box;
}
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #4facfe;
    color: white;
    font-size: 16px;
}
.error {
    background: #f8d7da;
    color: #721c24;
    border: 1px solid #dc3545;
    padding: 15px;
    margin-bottom: 25px;
    border-radius: 8px;
    text-align: center;
    font-weight: bold;
}
        </style> 
    </head>
    <body>
        <div class="container">
        <h1> Login</h1>
          {% if message %}
    <div class="message {{ message_type }}">
        {{ message }}
    </div>
    {% endif %}      
        <form method="POST">
            <label>Email:</label><br>
            <input type="email" name="email" required><br><br>
            <label>Password:</label><br>
            <input type="password" name="password" required ><br><br>
            <button type="submit">Login</button>
        </form>
        </div>
        <h4>Don't have an account? <a href="/register">Register here</a></h4>
    </body>
</html>
