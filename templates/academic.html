<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Academic Management</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:
    radial-gradient(circle at top left,#2563eb,transparent 35%),
    radial-gradient(circle at bottom right,#0891b2,transparent 35%),
    linear-gradient(135deg,#020617,#0f172a);

}

.container{

    width:500px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.15);

    border-radius:25px;

    padding:35px;

    box-shadow:0 20px 50px rgba(0,0,0,.5);

}

h1{

    color:#38bdf8;

    text-align:center;

    margin-bottom:30px;

}

label{

    display:block;

    margin-top:20px;

    color:#38bdf8;

    font-weight:bold;

}

select{

    width:100%;

    margin-top:10px;

    padding:14px;

    border:none;

    border-radius:12px;

    background:#1e293b;

    color:white;

    font-size:16px;

}

button{

    width:100%;

    margin-top:30px;

    padding:15px;

    border:none;

    border-radius:12px;

    background:linear-gradient(135deg,#2563eb,#0ea5e9);

    color:white;

    font-size:18px;

    font-weight:bold;

    cursor:pointer;

}

button:hover{

    transform:translateY(-3px);

}

.back{

    display:block;

    text-align:center;

    margin-top:20px;

    color:white;

    text-decoration:none;

    font-weight:bold;

}

</style>

</head>

<body>

<div class="container">

<h1>📚 Academic Management</h1>

<form method="POST" action="{{ url_for('academic') }}">

<label>🎓 Select Semester</label>

<select name="semester" required>

<option value="">-- Select Semester --</option>

<option value="1">Semester 1</option>
<option value="2">Semester 2</option>
<option value="3">Semester 3</option>
<option value="4">Semester 4</option>
<option value="5">Semester 5</option>
<option value="6">Semester 6</option>
<option value="7">Semester 7</option>
<option value="8">Semester 8</option>

</select>


<label>📝 Select Exam Type</label>

<select name="exam_type" required>

<option value="">-- Select Exam Type --</option>

<option value="Internal 1">Internal 1</option>
<option value="Internal 2">Internal 2</option>
<option value="Semester">Semester</option>

</select>

<button type="submit">
➡ Continue
</button>

</form>

<a href="{{ url_for('dashboard') }}" class="back">
⬅ Back to Dashboard
</a>

</div>

</body>

</html>
