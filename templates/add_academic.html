<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ exam_type }} - Semester {{ semester }}</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Poppins",sans-serif;
}

body{

    min-height:100vh;

    padding:40px;

    background:
        radial-gradient(circle at top left,#2563eb,transparent 35%),
        radial-gradient(circle at bottom right,#0891b2,transparent 35%),
        linear-gradient(135deg,#020617,#1e3a8a);

}

/* Container */

.container{

    width:95%;

    max-width:1200px;

    margin:auto;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.15);

    border-radius:25px;

    overflow:hidden;

    box-shadow:0 20px 50px rgba(0,0,0,.45);

}

/* Header */

.header{

    background:linear-gradient(135deg,#2563eb,#1d4ed8);

    padding:35px;

    text-align:center;

}

.header h1{

    color:white;

    font-size:38px;

    margin-bottom:10px;

    font-weight:700;

}

.header p{

    color:#dbeafe;

    font-size:18px;

}

/* Content */

.content{

    padding:35px;

}

/* Flash Message */

.flash{

    background:rgba(34,197,94,.15);

    border:1px solid #22c55e;

    color:#bbf7d0;

    padding:15px;

    border-radius:12px;

    text-align:center;

    margin-bottom:25px;

    font-weight:600;

}

/* Label */

label{

    display:block;

    color:#dbeafe;

    font-weight:600;

    margin-bottom:10px;

    font-size:16px;

}

/* Select */

select{

    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    background:#1e293b;

    color:white;

    font-size:16px;

    outline:none;

    margin-bottom:30px;

    transition:.3s;

}

select:focus{

    background:#334155;

    box-shadow:0 0 12px rgba(59,130,246,.45);

}

/* Table */

table{

    width:100%;

    border-collapse:collapse;

    overflow:hidden;

    border-radius:15px;

}

thead{

    background:linear-gradient(135deg,#2563eb,#1d4ed8);

}

th{

    color:white;

    padding:18px;

    font-size:16px;

}

td{

    padding:15px;

    border-bottom:1px solid rgba(255,255,255,.08);

    color:white;

    background:rgba(255,255,255,.03);

}

tbody tr:hover{

    background:rgba(255,255,255,.05);

}

/* Inputs */

input{

    width:100%;

    padding:12px;

    border:none;

    border-radius:10px;

    background:#1e293b;

    color:white;

    outline:none;

    transition:.3s;

    font-size:15px;

}

input:focus{

    background:#334155;

    box-shadow:0 0 10px rgba(59,130,246,.45);

}

input::placeholder{

    color:#94a3b8;

}

/* Action Buttons */

.actions{

    display:flex;

    gap:20px;

    margin-top:30px;

    flex-wrap:wrap;

}

/* Add Button */

.add{

    flex:1;

    min-width:180px;

    padding:15px;

    border:none;

    border-radius:12px;

    background:linear-gradient(135deg,#10b981,#059669);

    color:white;

    font-size:16px;

    font-weight:600;

    cursor:pointer;

    transition:.3s;

}

.add:hover{

    transform:translateY(-3px);

}

/* Save Button */

.save{

    flex:1;

    min-width:180px;

    padding:15px;

    border:none;

    border-radius:12px;

    background:linear-gradient(135deg,#2563eb,#1d4ed8);

    color:white;

    font-size:16px;

    font-weight:600;

    cursor:pointer;

    transition:.3s;

}

.save:hover{

    transform:translateY(-3px);

}

/* Delete Button */

.delete{

    width:42px;

    height:42px;

    border:none;

    border-radius:50%;

    background:linear-gradient(135deg,#ef4444,#dc2626);

    color:white;

    cursor:pointer;

    font-size:17px;

    transition:.3s;

}

.delete:hover{

    transform:scale(1.1);

}

/* Back Button */

.back{

    display:inline-flex;

    align-items:center;

    gap:10px;

    margin-top:30px;

    color:white;

    text-decoration:none;

    font-weight:600;

    transition:.3s;

}

.back:hover{

    color:#38bdf8;

    transform:translateX(-6px);

}

/* Scrollbar */

::-webkit-scrollbar{

    width:8px;

}

::-webkit-scrollbar-thumb{

    background:#3b82f6;

    border-radius:20px;

}

/* Responsive */

@media(max-width:768px){

    body{

        padding:20px;

    }

    .content{

        padding:20px;

    }

    .header h1{

        font-size:30px;

    }

    .header p{

        font-size:16px;

    }

    table{

        display:block;

        overflow-x:auto;

        white-space:nowrap;

    }

    .actions{

        flex-direction:column;

    }

    .add,

    .save{

        width:100%;

    }

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>{{ exam_type }}</h1>
<p>Semester {{ semester }} Academic Marks Entry</p>

</div>

<div class="content">

{% with messages=get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category,message in messages %}

<div class="flash">
{{ message }}
</div>

{% endfor %}
{% endif %}
{% endwith %}

<form method="POST">

<label>Select Student</label>

<select name="student_id" required>

<option value="">-- Select Student --</option>

{% for student in students %}

<option value="{{ student[0] }}">
{{ student[1] }} ({{ student[2] }})
</option>

{% endfor %}

</select>

<table id="marksTable">

<thead>

<tr>

<th>Subject Name</th>
<th>Marks</th>
<th>Remove</th>

</tr>

</thead>

<tbody>

<tr>

<td>
<input type="text" name="subject[]" required>
</td>

<td>
<input type="number" name="marks[]" min="0" max="100" required>
</td>

<td align="center">

<button type="button" class="delete" onclick="removeRow(this)">
✖
</button>

</td>

</tr>

</tbody>

</table>

<div class="actions">

<button type="button" class="add" onclick="addRow()">
➕ Add Subject
</button>

<button type="submit" class="save">
💾 Save Marks
</button>

</div>

</form>

<a href="/academic" class="back">
⬅ Back to Academic Management
</a>

</div>

</div>

<script>

function addRow(){

let table=document.getElementById("marksTable").getElementsByTagName("tbody")[0];

let row=table.insertRow();

row.innerHTML=`
<td><input type="text" name="subject[]" required></td>
<td><input type="number" name="marks[]" min="0" max="100" required></td>
<td align="center">
<button type="button" class="delete" onclick="removeRow(this)">✖</button>
</td>
`;

}

function removeRow(button){

let table=document.getElementById("marksTable");

if(table.rows.length>2){

button.parentNode.parentNode.remove();

}

}

</script>

</body>
</html>
