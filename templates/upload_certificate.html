<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload Certificate</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:
    radial-gradient(circle at top left,#2563eb,transparent 35%),
    radial-gradient(circle at bottom right,#0891b2,transparent 35%),
    linear-gradient(135deg,#020617,#0f172a);

}

.container{

    width:550px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.15);

    border-radius:25px;

    padding:35px;

}

h1{

    color:#38bdf8;

    text-align:center;

    margin-bottom:30px;

}

label{

    display:block;

    color:#38bdf8;

    margin-top:18px;

    font-weight:bold;

}

input,select{

    width:100%;

    margin-top:8px;

    padding:14px;

    border:none;

    border-radius:12px;

    background:#1e293b;

    color:white;

    font-size:16px;

}

button{

    width:100%;

    margin-top:30px;

    padding:15px;

    border:none;

    border-radius:12px;

    background:#2563eb;

    color:white;

    font-size:18px;

    cursor:pointer;

}

button:hover{

    background:#1d4ed8;

}

.back{

    display:block;

    text-align:center;

    margin-top:20px;

    color:white;

    text-decoration:none;

}

</style>

</head>

<body>

<div class="container">

<h1>📄 Upload Certificate</h1>

<form method="POST" enctype="multipart/form-data">

<label>Certificate Name</label>

<input
type="text"
name="certificate_name"
required>

<label>Issuer</label>

<input
type="text"
name="issuer"
required>

<label>Certificate ID</label>

<input
type="text"
name="certificate_id">

<label>Upload Certificate</label>

<input
type="file"
name="certificate"
accept=".pdf,.png,.jpg,.jpeg"
required>

<button type="submit">

📤 Upload Certificate

</button>

</form>

<a href="/student_dashboard" class="back">

⬅ Back to Dashboard

</a>

</div>

</body>
</html>
