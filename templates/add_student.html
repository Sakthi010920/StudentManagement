<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Student</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Poppins",sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:40px;

    background:
        radial-gradient(circle at top left,#2563eb,transparent 35%),
        radial-gradient(circle at bottom right,#0891b2,transparent 35%),
        linear-gradient(135deg,#020617,#1e3a8a);

}

/* Glass Container */

.container{

    width:100%;

    max-width:650px;

    background:rgba(68, 76, 121, 0.08);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.15);

    border-radius:25px;

    padding:40px;

    box-shadow:0 20px 50px rgba(0,0,0,.45);

}

/* Heading */

.container h1{

    text-align:center;

    color:#38bdf8;

    font-size:34px;

    margin-bottom:30px;

    font-weight:700;

}

/* Messages */

.success{

    background:rgba(34,197,94,.15);

    border:1px solid #22c55e;

    color:#bbf7d0;

    padding:14px;

    border-radius:12px;

    margin-bottom:25px;

    text-align:center;

    font-weight:600;

}

.error{

    background:rgba(239,68,68,.15);

    border:1px solid #ef4444;

    color:#fecaca;

    padding:14px;

    border-radius:12px;

    margin-bottom:25px;

    text-align:center;

    font-weight:600;

}

/* Form */

form{

    display:flex;

    flex-direction:column;

}

/* Labels */

label{

    color:#dbeafe;

    margin-bottom:8px;

    margin-top:15px;

    font-size:15px;

    font-weight:600;

}

/* Inputs */

input{

    width:100%;

    padding:14px 16px;

    border:none;

    border-radius:12px;

    background:#1e293b;

    color:white;

    font-size:15px;

    outline:none;

    transition:.3s;

}

input::placeholder{

    color:#94a3b8;

}

input:focus{

    background:#334155;

    box-shadow:0 0 12px rgba(59,130,246,.5);

}

/* Button */

button{

    width:100%;

    margin-top:30px;

    padding:15px;

    border:none;

    border-radius:12px;

    background:linear-gradient(135deg,#2563eb,#1d4ed8);

    color:white;

    font-size:17px;

    font-weight:600;

    cursor:pointer;

    transition:.3s;

    box-shadow:0 12px 25px rgba(37,99,235,.35);

}

button:hover{

    transform:translateY(-3px);

    background:linear-gradient(135deg,#3b82f6,#2563eb);

}

/* Back Button */

.back{

    display:inline-flex;

    gap:10px;
    margin-top:-10px;

    margin-bottom:30px;

    color:white;

    text-decoration:none;

    font-weight:600;

    transition:.3s;

}

.back:hover{

    color:#38bdf8;

    transform:translateX(-6px);

}

/* Scrollbar */

::-webkit-scrollbar{

    width:8px;

}

::-webkit-scrollbar-thumb{

    background:#3b82f6;

    border-radius:20px;

}

/* Responsive */

@media(max-width:768px){

    body{

        padding:20px;

    }

    .container{

        padding:25px;

    }

    .container h1{

        font-size:28px;

    }

    input{

        font-size:14px;

    }

    button{

        font-size:16px;

    }

}

</style>

</head>

<body>

<div class="container">
    <a href="/dashboard" class="back">
⬅ Back to Dashboard
</a>

<h1>👨‍🎓 Add Student</h1>

{% if message %}
<div class="{{ message_type }}">
{{ message }}
</div>
{% endif %}

<form method="POST">

<label>Student Name</label>
<input type="text" name="name" required>

<label>Register Number</label>
<input type="text" name="reg_no"  required>

<label>Department</label>
<input type="text" name="department"  required>

<label>Year</label>
<input type="text" name="year"  required>

<label>College</label>
<input type="text" name="college" required>

<label>Email</label>
<input type="email" name="email"  required>

<label>Phone Number</label>
<input type="text" name="phone"  required>

<button type="submit">
➕ Add Student
</button>

</form>

</div>

</body>

</html>
