<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Poppins",sans-serif;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:40px;

    background:linear-gradient(135deg,#020617,#0f172a,#1e3a8a,#2563eb);

    overflow:auto;

}

/* Background Glow */

body::before{

    content:"";

    position:fixed;

    width:420px;
    height:420px;

    background:#2563eb;

    border-radius:50%;

    filter:blur(170px);

    top:-120px;
    left:-100px;

    opacity:.35;

}

body::after{

    content:"";

    position:fixed;

    width:350px;
    height:350px;

    background:#60a5fa;

    border-radius:50%;

    filter:blur(160px);

    bottom:-120px;
    right:-100px;

    opacity:.30;

}

/* Card */

.container{

    position:relative;

    z-index:10;

    width:100%;
    max-width:520px;

    padding:40px;

    border-radius:24px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.15);

    box-shadow:0 20px 45px rgba(0,0,0,.45);

}

/* Heading */

.container h1{

    text-align:center;

    color:white;

    margin-bottom:30px;

    font-size:34px;

    font-weight:700;

}

/* Labels */

label{

    display:block;

    color:#dbeafe;

    margin-bottom:8px;

    font-size:15px;

    font-weight:600;

}

/* Inputs & Select */

input,
select{

    width:100%;

    padding:14px 16px;

    margin-bottom:18px;

    border:none;

    outline:none;

    border-radius:12px;

    background:rgba(255,255,255,.10);

    border:1px solid rgba(255,255,255,.18);

    color:white;

    font-size:15px;

    transition:.3s;

}

input::placeholder{

    color:#cbd5e1;

}

select option{

    color:black;

}

input:focus,
select:focus{

    border-color:#60a5fa;

    box-shadow:0 0 12px rgba(96,165,250,.45);

}

/* Button */

button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:12px;

    background:linear-gradient(135deg,#3b82f6,#2563eb);

    color:white;

    font-size:17px;

    font-weight:600;

    cursor:pointer;

    transition:.3s;

}

button:hover{

    transform:translateY(-3px);

    background:linear-gradient(135deg,#2563eb,#1d4ed8);

}

/* Messages */

.success{

    background:#16a34a;

    color:white;

    padding:14px;

    border-radius:10px;

    margin-bottom:20px;

    text-align:center;

}

.error{

    background:#dc2626;

    color:white;

    padding:14px;

    border-radius:10px;

    margin-bottom:20px;

    text-align:center;

}

/* Login Link */

.login{

    text-align:center;

    margin-top:25px;

    color:#dbeafe;

}

.login a{

    color:#60a5fa;

    text-decoration:none;

    font-weight:600;

}

.login a:hover{

    color:white;

    text-decoration:underline;

}

/* Footer */

.footer{

    text-align:center;

    margin-top:20px;

    color:#94a3b8;

    font-size:13px;

}

@media(max-width:600px){

.container{

    padding:28px;

}

.container h1{

    font-size:28px;

}

}

</style>

</head>

<body>

<div class="container">

<h1>📝 Registration</h1>

{% if message %}
<div class="{{ message_type }}">
{{ message }}
</div>
{% endif %}

<form method="POST">

<label>Name</label>
<input type="text" name="name"  required>

<label>Department</label>
<input type="text" name="department"  required>

<label>Email Address</label>
<input type="email" name="email" required>

<label>Password</label>
<input type="password" name="password"  required>

<label>Phone Number</label>
<input type="text" name="phone"  required>

<label>Select Role</label>

<select name="role" id="role" onchange="toggleAdminFields()" required>

<option value="">-- Select Role --</option>

<option value="admin">Admin</option>

<option value="student">Student</option>

</select>

<label>Organization Name</label>

<input
type="text"
name="organization"
placeholder="Enter College Name"
required>

<div id="adminFields" style="display:none;">

<label>Admin Code</label>

<input
type="password"
name="admin_code">

<label>Confirm Admin Code</label>

<input
type="password"
name="confirm_admin_code">

</div>

<button type="submit">

🚀 Register

</button>

</form>

<div class="login">

Already have an account?

<a href="/login">

Login here

</a>

</div>

</div>

<script>

function toggleAdminFields() {

    var role = document.getElementById("role").value;
    var adminFields = document.getElementById("adminFields");

    var adminCode = document.getElementsByName("admin_code")[0];
    var confirmCode = document.getElementsByName("confirm_admin_code")[0];

    if (role === "admin") {

        adminFields.style.display = "block";

        adminCode.required = true;
        confirmCode.required = true;

    } else {

        adminFields.style.display = "none";

        adminCode.required = false;
        confirmCode.required = false;

    }
}

</script>

</body>
</html>
