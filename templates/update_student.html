<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Update Student</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Poppins",sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px;
    background:
        radial-gradient(circle at top left,#2563eb,transparent 35%),
        radial-gradient(circle at bottom right,#0891b2,transparent 35%),
        linear-gradient(135deg,#020617,#1e3a8a);
}

/* Glass Container */

.container{

    width:100%;
    max-width:650px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.15);

    border-radius:25px;

    padding:40px;

    box-shadow:0 20px 50px rgba(0,0,0,.45);

}

/* Flash Messages */

.success,
.error,
.warning,
.info{

    width:100%;

    padding:15px 20px;

    margin-bottom:25px;

    border-radius:12px;

    font-size:15px;

    font-weight:600;

    text-align:center;

    animation:fadeIn .4s ease;

    border:1px solid transparent;

}

/* Success */

.success{

    background:rgba(34,197,94,.15);

    color:#bbf7d0;

    border-color:#22c55e;

}

/* Error */

.error{

    background:rgba(239,68,68,.15);

    color:#fecaca;

    border-color:#ef4444;

}

/* Warning */

.warning{

    background:rgba(245,158,11,.15);

    color:#fde68a;

    border-color:#f59e0b;

}

/* Info */

.info{

    background:rgba(59,130,246,.15);

    color:#bfdbfe;

    border-color:#3b82f6;

}

/* Animation */

@keyframes fadeIn{

    from{

        opacity:0;

        transform:translateY(-10px);

    }

    to{

        opacity:1;

        transform:translateY(0);

    }

}

/* Heading */

.container h1{

    color:#38bdf8;

    text-align:center;

    margin-bottom:30px;

    font-size:34px;

    font-weight:700;

}

/* Form */

form{

    display:flex;

    flex-direction:column;

}

/* Labels */

label{

    color:#dbeafe;

    margin-top:16px;

    margin-bottom:8px;

    font-weight:600;

    font-size:15px;

}

/* Inputs */

input{

    width:100%;

    padding:14px 16px;

    border:none;

    border-radius:12px;

    background:#1e293b;

    color:white;

    font-size:15px;

    outline:none;

    transition:.3s;

}

input::placeholder{

    color:#94a3b8;

}

input:focus{

    background:#334155;

    box-shadow:0 0 12px rgba(57, 127, 240, 0.5);

}

/* Update Button */

button{

    width:100%;

    margin-top:30px;

    padding:15px;

    border:none;

    border-radius:12px;

    background:linear-gradient(135deg,#2563eb,#1d4ed8);

    color:white;

    font-size:17px;

    font-weight:600;

    cursor:pointer;

    transition:.3s;

    box-shadow:0 12px 25px rgba(37,99,235,.35);

}

button:hover{

    transform:translateY(-3px);

    background:linear-gradient(135deg,#3b82f6,#2563eb);

}

/* Back Button */

.back{

    display:inline-flex;

    gap:10px;
    margin-bottom:29px;

    margin-top:-25px;

    color:white;

    text-decoration:none;

    font-weight:600;

    transition:.3s;

}

.back:hover{

    color:#38bdf8;

    transform:translateX(-6px);

}

/* Responsive */

@media(max-width:768px){

    body{

        padding:20px;

    }

    .container{

        padding:25px;

    }

    .container h1{

        font-size:28px;

    }

    input{

        font-size:14px;

    }

    button{

        font-size:16px;

    }

}

</style>

</head>

<body>

<div class="container">
    <a href="/view_students" class="back">
⬅ Back to Student
</a>

<h1>✏️ Update Student</h1>
{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
    {% for category, message in messages %}
        <div class="{{ category }}">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}
{% endwith %}

<form method="POST">

<label>Student Name</label>
<input type="text"
name="name"
required
value="{{ student[1] }}">

<label>Registration Number</label>
<input type="text"
name="reg_number"
required
value="{{ student[2] }}">

<label>Department</label>
<input type="text"
name="department"
required
value="{{ student[3] }}">

<label>Year</label>
<input type="text"
name="year"
required
value="{{ student[4] }}">

<label>College</label>
<input type="text"
name="college"
value="{{ student[5] }}">

<label>Email Address</label>
<input type="email"
name="email"
required
value="{{ student[6] }}">

<label>Phone Number</label>
<input type="text"
name="phone"
required
value="{{ student[7] }}">

<button type="submit">
💾 Update Student
</button>

</form>

</div>

</body>

</html>
